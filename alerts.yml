groups:
  - name: nodejs_app
    rules:
      - alert: HighHeapUsage
        expr: nodejs_heap_used_bytes / nodejs_heap_size_total_bytes > 0.85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Node.js heap usage is above 85%"
          description: "Heap used is {{ humanizePercentage $value }} of total for {{ $labels.instance }}"

      - alert: HighErrorRate
        expr: rate(http_request_errors_total[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate detected"
          description: "Error rate is {{ $value | humanize }} errors/sec on {{ $labels.instance }}"

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "95th percentile latency above 1s"
          description: "p95 latency is {{ $value | humanizeDuration }} on {{ $labels.instance }}"

      - alert: AppDown
        expr: up{job="nodejs-app"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Node.js app is down"
          description: "{{ $labels.instance }} has been unreachable for 30s"

      - alert: HighCPUUsage
        expr: rate(nodejs_process_cpu_seconds_total[1m]) * 100 > 80
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 80%"
          description: "CPU usage is {{ $value | humanize }}% on {{ $labels.instance }}"
