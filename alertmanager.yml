global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10m
  repeat_interval: 3h
  receiver: 'null'

  routes:
    - match:
        severity: critical
      receiver: 'null'   # Replace with email/slack/pagerduty receiver
      continue: true

receivers:
  - name: 'null'

  # Uncomment and configure for real alerting:
  # - name: 'slack'
  #   slack_configs:
  #     - api_url: 'YOUR_SLACK_WEBHOOK_URL'
  #       channel: '#alerts'
  #       send_resolved: true
  #       title: '{{ .Status | toUpper }} - {{ .CommonLabels.alertname }}'
  #       text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  # - name: 'email'
  #   email_configs:
  #     - to: 'you@example.com'
  #       from: 'alerts@example.com'
  #       smarthost: 'smtp.example.com:587'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']
